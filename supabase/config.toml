# Supabase local/dev config for the jomshop migration (Phase 0 spike).
# Portable across Supabase Cloud and self-host. If your CLI version rejects any
# field, regenerate a fresh baseline with `supabase init` and re-add the
# [auth.external.google] block below.

project_id = "jomshop"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Dev origins for the Solito apps (next = 19000, expo web = 19001).
site_url = "http://localhost:19000"
additional_redirect_urls = [
  "http://localhost:19000",
  "http://localhost:19001",
  # Native deep link — app.json scheme is "jomshop" (see makeRedirectUri in app).
  "jomshop://",
  "jomshop://auth-callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Google provider — secrets come from env so they never land in git.
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
skip_nonce_check = true

# Receipts: all receipt writes (upload/notes/archive) go through this function so
# CAPTCHA + per-tier limits + rate limits are enforced server-side. Requires a
# valid user JWT. Set the secret with: supabase secrets set TURNSTILE_SECRET_KEY=...
[functions.receipts]
verify_jwt = true
